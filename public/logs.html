<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fatsproxyai | Logs</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #000000;
            --surface: #111111;
            --surface-hover: #1a1a1a;
            --border: #222222;
            --text-main: #ffffff;
            --text-muted: #888888;
            --accent: #ffffff;
            --success: #00ff7f;
            --error: #ff4d4d;
            --blue: #0070f3;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: var(--bg);
            color: var(--text-main);
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            font-size: 14px;
            line-height: 1.5;
            -webkit-font-smoothing: antialiased;
        }

        /* Header */
        header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 12px 20px;
            border-bottom: 1px solid var(--border);
            height: 64px;
        }

        .logo-area {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .logo {
            font-weight: 600;
            font-size: 16px;
            letter-spacing: -0.02em;
        }

        .nav-center {
            position: absolute;
            left: 50%;
            transform: translateX(-50%);
            font-weight: 500;
            color: var(--text-muted);
        }

        .nav-center span {
            color: var(--text-main);
        }

        /* Controls */
        .controls {
            padding: 16px 20px;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .search-container {
            flex: 1;
            position: relative;
        }

        .search-container input {
            width: 100%;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 8px 12px 8px 36px;
            color: var(--text-main);
            font-family: inherit;
            outline: none;
            transition: border-color 0.2s;
        }

        .search-container input:focus {
            border-color: #444;
        }

        .search-icon {
            position: absolute;
            left: 12px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-muted);
        }

        .btn {
            background: var(--surface);
            border: 1px solid var(--border);
            color: var(--text-main);
            padding: 8px 16px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: background 0.2s;
        }

        .btn:hover {
            background: var(--surface-hover);
        }

        .btn-live {
            color: var(--text-main);
        }

        .btn-live.active {
            color: var(--text-main);
            background: rgba(255, 255, 255, 0.1);
        }

        .live-dot {
            width: 8px;
            height: 8px;
            background: var(--text-muted);
            border-radius: 50%;
        }

        .active .live-dot {
            background: var(--success);
            box-shadow: 0 0 8px var(--success);
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0% { opacity: 1; }
            50% { opacity: 0.5; }
            100% { opacity: 1; }
        }

        /* Chart Placeholder */
        .timeline {
            height: 60px;
            padding: 0 20px;
            display: flex;
            align-items: flex-end;
            gap: 2px;
            border-bottom: 1px solid var(--border);
            margin-bottom: 10px;
            overflow: hidden;
        }

        .bar {
            flex: 1;
            background: #222;
            min-height: 2px;
            border-radius: 1px 1px 0 0;
        }

        .bar.active {
            background: #ff4d4d;
        }

        /* Table */
        .table-container {
            width: 100%;
            overflow-x: auto;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            text-align: left;
        }

        th {
            color: var(--text-muted);
            font-weight: 500;
            font-size: 12px;
            text-transform: uppercase;
            padding: 12px 20px;
            border-bottom: 1px solid var(--border);
        }

        td {
            padding: 10px 20px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.03);
            vertical-align: middle;
        }

        tr:hover td {
            background: rgba(255, 255, 255, 0.02);
        }

        .col-time {
            color: var(--text-muted);
            font-family: 'JetBrains Mono', monospace;
            white-space: nowrap;
            width: 200px;
        }

        .col-time span {
            color: var(--text-main);
            font-weight: 500;
        }

        .col-status {
            width: 120px;
        }

        .status-badge {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            font-weight: 500;
            font-family: 'JetBrains Mono', monospace;
        }

        .status-200 { color: var(--success); }
        .status-error { color: var(--error); }

        .col-host {
            color: var(--text-muted);
            width: 200px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .col-request {
            font-family: 'JetBrains Mono', monospace;
            color: var(--text-main);
        }

        .req-icon {
            background: #222;
            width: 20px;
            height: 20px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            border-radius: 4px;
            font-size: 10px;
            margin-right: 8px;
        }

        .col-message {
            color: var(--text-muted);
            max-width: 400px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .error-text {
            color: var(--error);
        }

        /* Detail Modal */
        .modal-overlay {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.8);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            backdrop-filter: blur(4px);
        }

        .modal {
            background: var(--surface);
            border: 1px solid var(--border);
            width: 90%;
            max-width: 600px;
            border-radius: 12px;
            padding: 24px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.5);
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            margin-bottom: 20px;
        }

        .modal-title {
            font-size: 18px;
            font-weight: 600;
        }

        pre {
            background: #000;
            padding: 16px;
            border-radius: 8px;
            overflow: auto;
            font-family: 'JetBrains Mono', monospace;
            font-size: 12px;
            color: #ccc;
        }

        /* Mobile */
        @media (max-width: 768px) {
            .col-host, .col-message { display: none; }
            .nav-center { display: none; }
        }
    </style>
</head>
<body>

<header>
    <div class="logo-area">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/>
        </svg>
        <div class="logo">fatsproxyai</div>
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="margin-left: 4px; opacity: 0.5;">
            <path d="M7 13l5 5 5-5M7 6l5 5 5-5"/>
        </svg>
    </div>
    <div class="nav-center">Logs</div>
    <div style="display: flex; gap: 12px;">
        <div class="btn" style="padding: 6px; border-radius: 50%;">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <circle cx="12" cy="12" r="3"></circle>
                <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"></path>
            </svg>
        </div>
    </div>
</header>

<div class="controls">
    <div class="btn">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path>
        </svg>
    </div>
    <div class="search-container">
        <svg class="search-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="11" cy="11" r="8"></circle>
            <path d="M21 21l-4.35-4.35"></path>
        </svg>
        <input type="text" placeholder="Search logs..." id="searchInput">
    </div>
    <button class="btn btn-live active" id="liveBtn">
        <div class="live-dot"></div>
        Live
    </button>
    <button class="btn" id="refreshBtn">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M23 4v6h-6M1 20v-6h6M3.51 9a9 9 0 0114.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0020.49 15"></path>
        </svg>
    </button>
</div>

<div class="timeline" id="timeline">
    <!-- Generated Bars -->
</div>

<div class="table-container">
    <table>
        <thead>
            <tr>
                <th>Time</th>
                <th>Status</th>
                <th>Host</th>
                <th>Request</th>
                <th>Messages</th>
            </tr>
        </thead>
        <tbody id="logBody">
            <!-- Logs will appear here -->
        </tbody>
    </table>
</div>

<div class="modal-overlay" id="modalOverlay">
    <div class="modal">
        <div class="modal-header">
            <div class="modal-title" id="modalTitle">Request Details</div>
            <div style="cursor: pointer;" onclick="closeModal()">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <line x1="18" y1="6" x2="6" y2="18"></line>
                    <line x1="6" y1="6" x2="18" y2="18"></line>
                </svg>
            </div>
        </div>
        <pre id="modalContent"></pre>
    </div>
</div>

<script>
    let isLive = true;
    let autoRefreshTimer = null;

    function formatTime(isoString) {
        if (!isoString) return "--";
        const date = new Date(isoString);
        const months = ["JAN", "FEB", "MAR", "APR", "MAY", "JUN", "JUL", "AUG", "SEP", "OCT", "NOV", "DEC"];
        const day = date.getDate();
        const month = months[date.getMonth()];
        const time = date.toTimeString().split(' ')[0] + '.' + String(date.getMilliseconds()).padStart(2, '0').slice(0, 2);
        return `<span>${month} ${day}</span> ${time}`;
    }

    async function fetchLogs() {
        try {
            const res = await fetch('/api/logs?limit=50');
            const data = await res.json();
            if (data.ok) {
                renderLogs(data.logs);
                renderTimeline(data.logs);
            }
        } catch (err) {
            console.error("Fetch error:", err);
        }
    }

    function renderLogs(logs) {
        const body = document.getElementById('logBody');
        const searchTerm = document.getElementById('searchInput').value.toLowerCase();
        
        body.innerHTML = logs
            .filter(log => {
                if (!searchTerm) return true;
                return JSON.stringify(log).toLowerCase().includes(searchTerm);
            })
            .map(log => `
                <tr onclick='showDetails(${JSON.stringify(log)})' style="cursor: pointer;">
                    <td class="col-time">${formatTime(log.time)}</td>
                    <td class="col-status">
                        <div class="status-badge ${log.status >= 400 ? 'status-error' : 'status-200'}">
                            ${log.method || 'POST'} ${log.status}
                        </div>
                    </td>
                    <td class="col-host">${log.host || 'fatsproxyai...'}</td>
                    <td class="col-request">
                        <span class="req-icon">f</span>
                        ${log.path || '/api/generate'}
                    </td>
                    <td class="col-message">
                        <span class="${log.error ? 'error-text' : ''}">${log.message || ''}</span>
                    </td>
                </tr>
            `).join('');
    }

    function renderTimeline(logs) {
        const timeline = document.getElementById('timeline');
        timeline.innerHTML = '';
        // Mock timeline based on log density
        for (let i = 0; i < 60; i++) {
            const bar = document.createElement('div');
            bar.className = 'bar';
            const h = Math.random() * 40;
            bar.style.height = (h + 2) + 'px';
            if (Math.random() > 0.9) bar.classList.add('active');
            timeline.appendChild(bar);
        }
    }

    function showDetails(log) {
        document.getElementById('modalTitle').textContent = `${log.method || 'POST'} ${log.path || '/api/generate'}`;
        document.getElementById('modalContent').textContent = JSON.stringify(log, null, 2);
        document.getElementById('modalOverlay').style.display = 'flex';
    }

    function closeModal() {
        document.getElementById('modalOverlay').style.display = 'none';
    }

    function toggleLive() {
        isLive = !isLive;
        const btn = document.getElementById('liveBtn');
        if (isLive) {
            btn.classList.add('active');
            startAutoRefresh();
        } else {
            btn.classList.remove('active');
            stopAutoRefresh();
        }
    }

    function startAutoRefresh() {
        if (autoRefreshTimer) clearInterval(autoRefreshTimer);
        autoRefreshTimer = setInterval(fetchLogs, 5000);
    }

    function stopAutoRefresh() {
        if (autoRefreshTimer) clearInterval(autoRefreshTimer);
    }

    document.getElementById('liveBtn').addEventListener('click', toggleLive);
    document.getElementById('refreshBtn').addEventListener('click', fetchLogs);
    document.getElementById('searchInput').addEventListener('input', () => {
        // We'll just re-render current logs for search
        fetchLogs(); 
    });

    // Initial load
    fetchLogs();
    startAutoRefresh();
</script>

</body>
</html>
